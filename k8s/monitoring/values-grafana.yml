# =============================================================================
# Helm Values: grafana/grafana
# =============================================================================
# Tuned for Raspberry Pi CM5 (ARM64, 16GB RAM per node).
#
# Install with:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm repo update
#   helm install grafana grafana/grafana \
#     -n monitoring \
#     -f values-grafana.yml
# =============================================================================

# ---------------------------------------------------------------------------
# Hardened container security. Pod-level securityContext (runAsNonRoot, UID 472)
# and allowPrivilegeEscalation/caps/seccomp are set by chart defaults. Adding
# readOnlyRootFilesystem closes the KSV-0014 finding; /tmp emptyDir is required
# because Grafana writes session + cache files there.
# ---------------------------------------------------------------------------
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

extraVolumeMounts:
  - name: tmp
    mountPath: /tmp
extraVolumes:
  - name: tmp
    emptyDir: {}

# ---------------------------------------------------------------------------
# Service -- expose Grafana via MetalLB LoadBalancer for direct LAN access.
# ---------------------------------------------------------------------------
service:
  type: LoadBalancer

# ---------------------------------------------------------------------------
# Admin credentials
# ---------------------------------------------------------------------------
# TODO CHANGEME -- change this password immediately after first login!
# You can also set it via: --set adminPassword="your-secure-password"
adminUser: admin
adminPassword: admin

# ---------------------------------------------------------------------------
# Resources -- keep Grafana lightweight on the Pi.
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

# ---------------------------------------------------------------------------
# Persistence -- store dashboards and settings across restarts.
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  size: 5Gi
  # Uses default StorageClass (K3s local-path-provisioner).
  # storageClassName: ""

# ---------------------------------------------------------------------------
# Node selector -- ensure scheduling on ARM64 nodes.
# ---------------------------------------------------------------------------
nodeSelector:
  kubernetes.io/arch: arm64

# ---------------------------------------------------------------------------
# Datasources -- pre-configure Prometheus so it is ready on first login.
# The URL points to the Prometheus server Service within the monitoring
# namespace (ClusterIP, no external access needed).
# ---------------------------------------------------------------------------
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        # This DNS name resolves inside the cluster:
        #   <service-name>.<namespace>.svc.cluster.local
        url: http://prometheus-server.monitoring.svc.cluster.local
        access: proxy
        isDefault: true
        editable: true
      - name: Loki
        type: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
        editable: true

# ---------------------------------------------------------------------------
# Dashboard providers -- tell Grafana where to find dashboard JSON files.
# ---------------------------------------------------------------------------
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

# ---------------------------------------------------------------------------
# Dashboards -- auto-import community dashboards by ID from grafana.com.
#
#   15757 = "Kubernetes / Views / Global" -- a great overview dashboard.
#   1860  = "Node Exporter Full" -- per-node hardware metrics.
#
# Grafana downloads these on startup. No manual import needed.
# Browse more at https://grafana.com/grafana/dashboards/
# ---------------------------------------------------------------------------
dashboards:
  default:
    kubernetes-global:
      gnetId: 15757
      revision: 37
      datasource: Prometheus
    node-exporter:
      gnetId: 1860
      revision: 37
      datasource: Prometheus

# ---------------------------------------------------------------------------
# Sidecar -- watches for ConfigMaps labeled grafana_dashboard and loads them.
# ---------------------------------------------------------------------------
sidecar:
  # k8s-sidecar is a tiny Python watcher. It writes dashboard JSON files
  # to /tmp/dashboards (a shared emptyDir with the main grafana container,
  # provided by the chart). It does not need /tmp itself, so readOnly rootfs
  # is safe here.
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  dashboards:
    enabled: true
    label: grafana_dashboard
    folder: /tmp/dashboards
    resource: configmap
    searchNamespace: monitoring

# ---------------------------------------------------------------------------
# Ingress -- disabled for now; using MetalLB LoadBalancer for direct access.
# Re-enable once Cloudflare tunnel + cert-manager are configured.
# ---------------------------------------------------------------------------
ingress:
  enabled: false

# ---------------------------------------------------------------------------
# Grafana configuration overrides (grafana.ini)
# ---------------------------------------------------------------------------
grafana.ini:
  server:
    # Serve from root on the LoadBalancer IP
    root_url: "%(protocol)s://%(domain)s/"
    serve_from_sub_path: false
  # Disable analytics/telemetry to save bandwidth on a Pi
  analytics:
    check_for_updates: false
    reporting_enabled: false
