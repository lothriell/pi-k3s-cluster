# NetworkPolicy: gitea namespace
#
# Pattern: podSelector {} selects all pods in the namespace; the presence of
# this policy with an `ingress:` block causes an implicit deny for anything
# not matched by a rule below. No separate "default-deny" policy needed.
#
# Traffic allowed:
#   - Traefik (kube-system) → gitea-http:3000 (web UI + git over HTTPS)
#   - ArgoCD (argocd ns)    → gitea-http:3000 (git pulls + container registry)
#   - Trivy (trivy-system)  → gitea-http:3000 (container image scanning)
#   - Prometheus (monitoring ns) → gitea-http:3000 (future metrics scraping)
#   - Any source → gitea-ssh:2222 (NodePort 30022 → pod:2222 for git over SSH)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gitea-allowed-ingress
  namespace: gitea
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 3000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
      ports:
        - protocol: TCP
          port: 3000
    # Trivy scan jobs hit a kube-router race against namespaceSelector
    # ipsets — new scan pod's IP isn't in the per-namespace ipset for ~3s
    # after pod creation, but trivy connects in <1s and gets `connection
    # refused`. Result: every eve-tracker scan loses the race, no
    # VulnerabilityReports written. See feedback_kube_router_race memory.
    #
    # Workaround until DR-3 (move eve-tracker images to ghcr.io) lands:
    # allow the entire cluster pod CIDR to hit gitea:3000. ipBlock rules
    # are programmed into iptables CIDR matches at netpol install time —
    # no per-pod ipset propagation, no race. The CIDR is bounded to the
    # pod network (10.42.0.0/16, K3s default), and gitea registry already
    # requires auth (HTTP 401 anonymous), so the operational risk is small.
    # Remove this rule once eve-tracker images move to a public registry.
    - from:
        - ipBlock:
            cidr: 10.42.0.0/16
      ports:
        - protocol: TCP
          port: 3000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: trivy-system
      ports:
        - protocol: TCP
          port: 3000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3000
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 2222
