# NetworkPolicy: open-webui namespace
#
# open-webui is the ChatGPT-like frontend for Ollama. Egress to Ollama is
# controlled at the service-endpoint level (ollama-external in default ns).
# Ingress is only from Traefik (Mac /etc/hosts → chat.<local_domain>).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: open-webui-allowed-ingress
  namespace: open-webui
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
