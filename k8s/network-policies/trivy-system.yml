# NetworkPolicy: trivy-system namespace
#
# Trivy Operator scans workloads and exposes metrics on port 80. Prometheus
# (monitoring ns) scrapes via extraScrapeConfigs in values-prometheus.yml.
# Nothing else needs to talk to it — the operator is purely a watcher.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trivy-system-allowed-ingress
  namespace: trivy-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 80
