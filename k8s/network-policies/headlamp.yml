# NetworkPolicy: headlamp namespace
#
# Headlamp is a read-only Kubernetes web UI. Ingress only from Traefik
# (headlamp.<local_domain> via local-ingress) and Prometheus scraping.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: headlamp-allowed-ingress
  namespace: headlamp
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 4466
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4466
