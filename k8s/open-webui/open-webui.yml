# =============================================================================
# Open WebUI -- ChatGPT-like interface for Ollama
# =============================================================================
# Connects to Ollama on the GPU server via the ollama-external K8s service.
# SQLite conversation history persisted on a PVC.
# Access via: http://chat.example.local
#
# Apply with: kubectl apply -f k8s/open-webui/open-webui.yml
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: open-webui

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: open-webui
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
          env:
            # Point to Ollama via the K8s service proxy
            - name: OLLAMA_BASE_URL
              value: "http://ollama-external.default.svc.cluster.local:11434"
            # Offload embedding to Ollama to save RAM on cluster nodes
            - name: RAG_EMBEDDING_ENGINE
              value: "ollama"
            - name: AUDIO_STT_ENGINE
              value: "openai"
            # Disable telemetry
            - name: SCARF_NO_ANALYTICS
              value: "true"
            - name: DO_NOT_TRACK
              value: "true"
            # First user to sign up becomes admin. Disable manually after:
            #   kubectl set env deployment/open-webui -n open-webui ENABLE_SIGNUP=false
            - name: ENABLE_SIGNUP
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data

---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: open-webui
spec:
  selector:
    app: open-webui
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-webui
  namespace: open-webui
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    # TODO CHANGEME -- replace with your actual domain
    - host: chat.example.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
