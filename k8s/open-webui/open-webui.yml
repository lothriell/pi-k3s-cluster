# =============================================================================
# Open WebUI -- ChatGPT-like interface for Ollama
# =============================================================================
# Connects to Ollama on the GPU server via the ollama-external K8s service.
# SQLite conversation history persisted on a PVC.
# Access via: http://chat.example.local
#
# Apply with: kubectl apply -f k8s/open-webui/open-webui.yml
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: open-webui

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: open-webui
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      # NOTE on hardening: Open WebUI's client-side SvelteKit bundle throws
      # a hydration error after login when the container runs with
      # readOnlyRootFilesystem: true, even with initContainer-copied static
      # dir and /tmp emptyDir. The backend logs show all 200s, but the
      # browser navigates to /error. Root cause not identified as of
      # 2026-04-14 — likely a runtime write we couldn't pinpoint. To avoid
      # keeping the UI broken, readOnlyRootFilesystem is disabled for this
      # container only. The meaningful hardening below (drop ALL caps,
      # seccomp, allowPrivilegeEscalation: false) remains in place.
      # Accepts 1 × KSV-0014 finding on open-webui.
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
          env:
            # Point to Ollama via the K8s service proxy
            - name: OLLAMA_BASE_URL
              value: "http://ollama-external.default.svc.cluster.local:11434"
            # Offload embedding to Ollama to save RAM on cluster nodes
            - name: RAG_EMBEDDING_ENGINE
              value: "ollama"
            - name: AUDIO_STT_ENGINE
              value: "openai"
            # Disable telemetry
            - name: SCARF_NO_ANALYTICS
              value: "true"
            - name: DO_NOT_TRACK
              value: "true"
            # First user to sign up becomes admin. Disable manually after:
            #   kubectl set env deployment/open-webui -n open-webui ENABLE_SIGNUP=false
            - name: ENABLE_SIGNUP
              value: "true"
            # With readOnlyRootFilesystem: true, the default `.webui_secret_key`
            # relative path is not writable. Point it at the PVC instead so the
            # key is generated once and persisted across pod restarts.
            - name: WEBUI_SECRET_KEY_FILE
              value: "/app/backend/data/.webui_secret_key"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem disabled — see note at the top of the
            # pod template. The open-webui client bundle breaks after login
            # when rootfs is read-only even with copy-static initContainer.
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data

---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: open-webui
spec:
  selector:
    app: open-webui
  ports:
    - port: 8080
      targetPort: 8080


# NOTE: the Ingress for this service lives in a sibling file
# `ingress.local.yml` (gitignored) so your private hostname doesn't leak to
# the committed repo. See `ingress.local.yml.example` for the template and
# copy it to `ingress.local.yml` with your actual domain:
#
#     cp k8s/open-webui/ingress.local.yml.example k8s/open-webui/ingress.local.yml
#     # edit the host field, then
#     kubectl apply -f k8s/open-webui/ingress.local.yml
