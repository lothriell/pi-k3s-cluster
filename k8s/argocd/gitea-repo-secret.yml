# =============================================================================
# ArgoCD Repository Secret -- connects ArgoCD to your local Gitea instance
# =============================================================================
# ArgoCD needs credentials to access private Git repositories. This Secret
# tells ArgoCD how to reach your Gitea server running inside the cluster.
#
# How to use:
#   1. Replace the placeholder values below with your actual Gitea credentials.
#   2. Apply the secret:
#        kubectl apply -f gitea-repo-secret.yml
#   3. ArgoCD will automatically discover this secret (because of the
#      "argocd.argoproj.io/secret-type: repository" label) and use it when
#      accessing repos at the configured URL.
#
# Notes:
#   - The URL uses the in-cluster Kubernetes DNS name for Gitea, so ArgoCD
#     talks to Gitea directly inside the cluster (no ingress needed).
#   - If your Gitea repos are public, you can remove the username/password
#     fields, but keeping them allows access to private repos too.
#   - You can create multiple secrets like this for different Gitea users
#     or organizations.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: gitea-repo-creds
  namespace: argocd
  labels:
    # This label is required -- it tells ArgoCD this Secret contains
    # repository connection information.
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  # The type of repository. Use "git" for standard Git repos.
  type: git

  # The base URL of your Gitea instance. This uses the in-cluster service DNS
  # name so ArgoCD can reach Gitea without going through the ingress.
  # Format: http://<service-name>.<namespace>.svc.cluster.local:<port>
  url: http://gitea-http.gitea.svc.cluster.local:3000

  # TODO CHANGEME -- your Gitea username (the account that has access to
  # the repos you want ArgoCD to watch).
  username: CHANGEME

  # TODO CHANGEME -- your Gitea password or an access token.
  # Using an access token is recommended over a password. You can create one
  # in Gitea under Settings > Applications > Generate New Token.
  password: CHANGEME
