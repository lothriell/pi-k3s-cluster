---
# ArgoCD Application for eve-tracker DEV overlay.
# See eve-tracker-app.yml header comment — same CRD-based Image Updater
# pattern, same `gitea-registry` pull-secret prerequisite.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eve-tracker-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/CHANGEME/eve-tracker-k8s.git
    targetRevision: main
    path: overlays/dev
    # Required for Image Updater v1.1+ source-type detection — see
    # eve-tracker-app.yml header for the full explanation.
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: eve-tracker-dev
  # See eve-tracker-app.yml for the ignoreDifferences rationale —
  # pre-bound restored PVC has volumeName set; source doesn't.
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec/volumeName
        - /metadata/labels/longhorn-restore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
