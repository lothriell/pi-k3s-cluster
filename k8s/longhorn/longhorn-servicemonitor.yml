---
apiVersion: v1
kind: Service
metadata:
  name: longhorn-metrics
  namespace: longhorn-system
  labels:
    app: longhorn-manager
spec:
  selector:
    app: longhorn-manager
  ports:
    - name: metrics
      port: 9500
      targetPort: 9500
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-longhorn-scrape
  namespace: monitoring
  labels:
    app: prometheus
data:
  longhorn.yml: |
    - job_name: longhorn
      scrape_interval: 30s
      metrics_path: /metrics
      static_configs:
        - targets:
          - longhorn-backend.longhorn-system.svc:9500
