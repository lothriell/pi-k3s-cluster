# =============================================================================
# MetalLB Configuration -- Layer 2 Mode
# =============================================================================
# MetalLB gives your bare-metal K3s cluster the ability to assign real LAN IP
# addresses to Services of type LoadBalancer (something that normally only
# works in cloud environments like AWS/GCP/Azure).
#
# How L2 mode works:
#   - MetalLB picks an IP from the pool below and responds to ARP requests
#     for that IP on your local network.
#   - Other devices on your LAN can reach that IP directly.
#   - No special router/switch configuration needed (unlike BGP mode).
#
# Prerequisites:
#   helm repo add metallb https://metallb.github.io/metallb
#   helm repo update
#   helm install metallb metallb/metallb -n metallb-system
#
# Then apply this config:
#   kubectl apply -f metallb-config.yml
#
# =============================================================================

---
# ---------------------------------------------------------------------------
# IPAddressPool -- defines which IP addresses MetalLB can hand out.
# ---------------------------------------------------------------------------
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: default-pool
  namespace: metallb-system
spec:
  addresses:
    # TODO CHANGEME -- adjust this range to match YOUR local network.
    #
    # Rules for choosing your range:
    #   1. Must be on the same subnet as your Pi nodes (e.g., 192.168.1.x)
    #   2. Must NOT overlap with your router's DHCP range
    #   3. Must NOT include IPs already assigned to other devices
    #
    # Example: if your router is 192.168.1.1 and DHCP hands out .100-.199,
    # then .200-.220 is a safe range for MetalLB.
    #
    # If your network is 10.0.0.x, change this to something like:
    #   - 10.0.0.200-10.0.0.220
    - 192.168.1.200-192.168.1.220

---
# ---------------------------------------------------------------------------
# L2Advertisement -- tells MetalLB to advertise IPs using Layer 2 (ARP).
# ---------------------------------------------------------------------------
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: default-l2
  namespace: metallb-system
spec:
  # Reference the pool defined above. MetalLB will respond to ARP requests
  # for any IP in this pool.
  ipAddressPools:
    - default-pool
  # If you have multiple network interfaces on your Pi nodes (e.g., eth0 and
  # wlan0), you can restrict which interface MetalLB uses:
  # interfaces:
  #   - eth0
