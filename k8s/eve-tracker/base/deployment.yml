---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eve-tracker-backend
  labels:
    app: eve-tracker
    component: backend
spec:
  replicas: 1
  strategy:
    type: Recreate  # SQLite can't handle multiple writers
  selector:
    matchLabels:
      app: eve-tracker
      component: backend
  template:
    metadata:
      labels:
        app: eve-tracker
        component: backend
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      imagePullSecrets:
        - name: gitea-registry
      containers:
        - name: backend
          image: gitea.yourdomain.com/CHANGEME/eve-tracking-jobs-backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: DB_PATH
              value: "/app/database/data/eve_esi.db"
          envFrom:
            - secretRef:
                name: eve-tracker-secret
          volumeMounts:
            - name: data
              mountPath: /app/database/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: eve-tracker-data

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eve-tracker-frontend
  labels:
    app: eve-tracker
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eve-tracker
      component: frontend
  template:
    metadata:
      labels:
        app: eve-tracker
        component: frontend
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      imagePullSecrets:
        - name: gitea-registry
      containers:
        - name: frontend
          image: gitea.yourdomain.com/CHANGEME/eve-tracking-jobs-frontend:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: nginx-config
          configMap:
            name: eve-tracker-nginx
