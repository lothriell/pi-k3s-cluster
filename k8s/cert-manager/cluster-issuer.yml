# =============================================================================
# Internal CA — cert-manager ClusterIssuers for local *.<local_domain> TLS
# =============================================================================
# Three resources form the chain:
#   1. selfsigned-bootstrap (ClusterIssuer) — only used to sign the root CA
#   2. homielab-ca (Certificate)            — long-lived self-signed root, in
#                                             cert-manager namespace
#   3. homielab-internal (ClusterIssuer)    — CA issuer that signs leaf certs
#                                             from the homielab-ca secret
#
# Workflow:
#   - Apply this file (the Makefile cert-manager target does this).
#   - cert-manager creates the secret `homielab-ca-tls` in cert-manager ns,
#     containing the root CA cert + key.
#   - All Ingresses with annotation
#       cert-manager.io/cluster-issuer: homielab-internal
#     get leaf certs auto-minted into namespace-local Secrets.
#
# Trusting the root CA on clients (one-time per device):
#   make trust-ca-export   # writes /tmp/homielab-ca.crt
#   See docs/internal-ca-trust.md for Mac / Windows / iPad steps.
# =============================================================================

---
# Step 1 — bootstrap issuer that signs only the root CA below.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}

---
# Step 2 — long-lived root CA. 10-year validity. Renewed automatically by
# cert-manager 30 days before expiry, but you'd lose client trust on renewal,
# so the long lifetime is intentional. Rotate manually if it's ever leaked.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homielab-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: homielab-internal-ca
  subject:
    organizations:
      - homielab
  duration: 87600h     # 10 years
  renewBefore: 720h    # 30 days
  privateKey:
    algorithm: ECDSA
    size: 384
    rotationPolicy: Never
  secretName: homielab-ca-tls
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io

---
# Step 3 — the issuer everything else uses. Reads the root CA from the secret
# minted in step 2 and signs leaf certs (1-year, auto-renewed at 30 days).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: homielab-internal
spec:
  ca:
    secretName: homielab-ca-tls
