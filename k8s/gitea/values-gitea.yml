# =============================================================================
# Helm Values: gitea/gitea
# =============================================================================
# Lightweight self-hosted Git service, tuned for Raspberry Pi CM5 (ARM64).
# Uses built-in SQLite instead of PostgreSQL to keep the footprint minimal.
#
# Install with:
#   helm repo add gitea https://dl.gitea.com/charts/
#   helm repo update
#   helm install gitea gitea/gitea \
#     -n gitea \
#     -f values-gitea.yml
# =============================================================================

# ---------------------------------------------------------------------------
# Container image -- the official Gitea image supports linux/arm64.
# ---------------------------------------------------------------------------
image:
  rootless: true

# ---------------------------------------------------------------------------
# Hardened pod + container securityContext.
# The rootless Gitea image already runs as the `git` user (UID 1000). The
# chart applies containerSecurityContext to both init containers and the
# main container. Gitea writes everything to /data (the PVC), so
# readOnlyRootFilesystem is safe. fsGroup 1000 lets the PVC be writable by
# the git group.
# ---------------------------------------------------------------------------
podSecurityContext:
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# ---------------------------------------------------------------------------
# Resources -- sized for a Pi node with 16GB RAM.
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ---------------------------------------------------------------------------
# Deployment strategy -- MUST be Recreate (not RollingUpdate).
# ---------------------------------------------------------------------------
# Gitea uses a ReadWriteOnce PVC. The chart default is RollingUpdate with
# maxSurge: 100% / maxUnavailable: 0, which tries to create a new pod before
# terminating the old one — but the new pod can never mount the PVC while the
# old pod still holds it, and the old pod is waiting for the new pod to be
# ready. Infinite deadlock documented in CLAUDE.md under "Gitea Helm Rolling
# Update Deadlock".
#
# Recreate tells Kubernetes: kill old pod FIRST, then create new. Single-
# replica app, ~15 s of unavailability on each upgrade, zero deadlock risk.
strategy:
  type: Recreate
  rollingUpdate: null

# ---------------------------------------------------------------------------
# Node selector -- schedule on ARM64 nodes.
# ---------------------------------------------------------------------------
nodeSelector:
  kubernetes.io/arch: arm64

# ---------------------------------------------------------------------------
# Persistence -- stores Git repos, LFS objects, and Gitea data.
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  size: 10Gi
  # Uses default StorageClass (K3s local-path-provisioner).
  # storageClassName: ""

# ---------------------------------------------------------------------------
# Database -- use SQLite instead of PostgreSQL.
# SQLite is simpler, lighter, and perfectly fine for a small team / learning
# environment. No separate database pod needed.
# ---------------------------------------------------------------------------
postgresql:
  enabled: false

postgresql-ha:
  enabled: false

# ---------------------------------------------------------------------------
# Redis / Memcached -- disable to save resources.
# Gitea can run fine without an external cache for small installations.
# ---------------------------------------------------------------------------
redis-cluster:
  enabled: false

redis:
  enabled: false

valkey:
  enabled: false

valkey-cluster:
  enabled: false

# ---------------------------------------------------------------------------
# Gitea application configuration (app.ini)
# ---------------------------------------------------------------------------
gitea:
  config:
    # Database: SQLite file stored on the persistent volume.
    database:
      DB_TYPE: sqlite3
      PATH: /data/gitea/gitea.db

    # Cache: use in-memory cache instead of external Redis/Memcached.
    cache:
      ADAPTER: memory
      INTERVAL: 60
      HOST: ""

    # Session: store sessions on the filesystem (no Redis needed).
    session:
      PROVIDER: file
      PROVIDER_CONFIG: /data/gitea/sessions

    # Queue: use a level-DB based queue (no Redis needed).
    queue:
      TYPE: channel

    # Server settings
    server:
      # ROOT_URL must be the internal service URL for the container registry
      # Www-Authenticate header to resolve inside the cluster. External access
      # works through Traefik ingress regardless of this setting.
      ROOT_URL: http://gitea-http.gitea.svc.cluster.local:3000
      # TODO CHANGEME -- set to your actual domain
      DOMAIN: gitea.yourdomain.com
      SSH_DOMAIN: gitea.yourdomain.com
      # SSH on a non-standard port to avoid conflicts with host SSH
      SSH_PORT: 2222
      SSH_LISTEN_PORT: 2222
      LFS_START_SERVER: true

    # Reduce background task frequency to save CPU cycles on the Pi
    cron:
      ENABLED: true
      RUN_AT_START: false
    "cron.repo_health_check":
      SCHEDULE: "@every 72h"
    "cron.resync_all_sshkeys":
      SCHEDULE: "@every 72h"

    # Limit resource-heavy features
    indexer:
      REPO_INDEXER_ENABLED: false

    # Container registry -- allows pushing/pulling Docker images.
    # Images are stored on the persistent volume alongside Git repos.
    packages:
      ENABLED: true

    # Logging: keep it quiet
    log:
      LEVEL: Warn

  # -- Admin account -- pre-created on every deploy so it survives nuke-and-rebuild.
  #    Credentials are injected via --set flags in the Ansible playbook (05-deploy-gitea.yml)
  #    from variables defined in all.yml (gitignored).

  # -- Gitea Actions (CI/CD runner) -- disabled by default to save resources.
  #    Enable later when you want CI/CD pipelines.
  #    See: https://docs.gitea.com/usage/actions/overview
  actions:
    enabled: false

# ---------------------------------------------------------------------------
# Ingress -- expose Gitea through Traefik (K3s default ingress controller).
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: traefik
    # Uncomment once cert-manager is working:
    # cert-manager.io/cluster-issuer: letsencrypt-production
  hosts:
    # TODO CHANGEME -- replace with your actual domain
    - host: gitea.yourdomain.com
      paths:
        - path: /
          pathType: Prefix

  # Uncomment to enable TLS (requires cert-manager):
  # tls:
  #   - secretName: gitea-tls
  #     hosts:
  #       - gitea.yourdomain.com

# ---------------------------------------------------------------------------
# Service -- ClusterIP is fine when using Ingress. NodePort for SSH access.
# ---------------------------------------------------------------------------
service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    type: NodePort
    port: 2222
    # TODO CHANGEME -- pick a NodePort that does not conflict with other services
    nodePort: 30022
