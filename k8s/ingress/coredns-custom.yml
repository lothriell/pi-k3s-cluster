# Custom CoreDNS entries for *.example.local resolution inside the cluster.
# This allows pods to resolve local domains that external clients use.
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  example.override: |
    rewrite name gitea.example.local gitea-http.gitea.svc.cluster.local
