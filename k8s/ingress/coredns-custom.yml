# Custom CoreDNS entries for *.homielab.omg resolution inside the cluster.
# This allows pods to resolve local domains that external clients use.
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  homielab.override: |
    rewrite name gitea.homielab.omg gitea-http.gitea.svc.cluster.local
