# =============================================================================
# Local domain ingress rules for *.example.local
# =============================================================================
# Routes local domain names to cluster services via Traefik.
# Requires DNS resolution of *.example.local -> METALLB_VIP (Traefik LB IP).
#
# Apply with: kubectl apply -f local-ingress.yml
# =============================================================================

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-local
  namespace: monitoring
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: grafana.example.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 80

