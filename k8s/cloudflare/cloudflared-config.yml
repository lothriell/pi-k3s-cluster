# =============================================================================
# Cloudflared Tunnel Configuration (ConfigMap)
# =============================================================================
# This ConfigMap defines which public hostnames map to which internal K8s
# services. When a request arrives at Cloudflare for one of these hostnames,
# cloudflared routes it to the corresponding service inside your cluster.
#
# How it works:
#   [User visits grafana.example.com]
#     --> Cloudflare edge receives the request
#     --> Routes it through the tunnel to your cloudflared pod
#     --> cloudflared matches the hostname to an ingress rule below
#     --> Forwards to the K8s Service (e.g., grafana.monitoring:80)
#     --> Response flows back the same way
#
# Apply with:
#   kubectl apply -f cloudflared-config.yml
#
# After changing this file, restart the cloudflared pods to pick up changes:
#   kubectl rollout restart deployment/cloudflared -n cloudflare
#
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflare
data:
  config.yml: |
    # -----------------------------------------------------------------------
    # Tunnel ID -- the UUID you got when you ran:
    #   cloudflared tunnel create pi-cluster
    # -----------------------------------------------------------------------
    tunnel: 44ab070c-301e-4dbf-9c88-d254b935beec

    # Path to the credentials file (mounted from the K8s Secret)
    credentials-file: /etc/cloudflared/credentials.json

    # -----------------------------------------------------------------------
    # Ingress rules -- map public hostnames to internal K8s services.
    #
    # Format:
    #   - hostname: <public hostname>
    #     service: <protocol>://<service-name>.<namespace>.svc.cluster.local:<port>
    #
    # The service URL uses Kubernetes internal DNS:
    #   <service-name>.<namespace>.svc.cluster.local
    #
    # Rules are evaluated top-to-bottom. The first matching rule wins.
    # The last rule MUST be a catch-all (no hostname) that returns 404.
    # -----------------------------------------------------------------------
    ingress:
      # -----------------------------------------------------------------------
      # Admin/ops tools (Grafana, Gitea, ArgoCD) are NOT exposed here.
      # They are accessible via Tailscale or LAN MetalLB IPs only.
      # Only add public-facing user apps below.
      # -----------------------------------------------------------------------

      # -- Add public-facing services here. Examples:
      #
      # - hostname: app.example.com
      #   service: http://my-app.default.svc.cluster.local:8080
      #
      # - hostname: wiki.example.com
      #   service: http://wiki.default.svc.cluster.local:3000
      # -----------------------------------------------------------------------

      # -- Catch-all rule (REQUIRED, must be last)
      # Any request that does not match a hostname above gets a 404.
      # This prevents unexpected traffic from reaching your cluster.
      - service: http_status:404
