---
# Install and configure Tailscale on Raspberry Pi CM5 nodes
# The K3s server node is configured as a subnet router to advertise
# the local network (nodes + MetalLB IPs) to the Tailscale network.

- name: Add Tailscale GPG key
  ansible.builtin.shell: |
    curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg \
      | tee /usr/share/keyrings/tailscale-archive-keyring.gpg > /dev/null
  args:
    creates: /usr/share/keyrings/tailscale-archive-keyring.gpg
  tags: [tailscale, packages]

- name: Add Tailscale apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/tailscale.list
    content: |
      deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu noble main
    owner: root
    group: root
    mode: "0644"
  tags: [tailscale, packages]

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true
  tags: [tailscale, packages]

- name: Enable and start tailscaled service
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started
  tags: [tailscale, services]

- name: Check if Tailscale is already authenticated
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false
  tags: [tailscale]

# Cluster nodes must NOT accept tailnet routes. If they do, LAN traffic gets
# routed through the tailnet and breaks Flannel, MetalLB ARP, and inter-node
# networking. We pass --accept-routes=false explicitly below and assert the
# final state afterwards.
#
# --ssh turns on the in-tailscaled SSH server so tailnet peers can SSH in
# without managing authorized_keys. Access is still gated by the tailnet ACL
# policy — enabling --ssh on the node is a prerequisite, not a grant.
# Rescue path: if the botched nuke-cluster.sh recurs, tailnet-direct SSH
# still works even when the subnet route is flapping.

# ----------------------------------------------------------------------------
# Self-heal MagicDNS `-N` suffix drift.
#
# 2026-04-15 incident: the Pi nodes enrolled in the tailnet on 2026-03-28
# during a 24h name-reservation cooldown from an earlier cluster iteration
# and ended up with `rpi-k3s-1-1.tail713e5.ts.net` instead of the clean
# `rpi-k3s-1.tail713e5.ts.net`. Subsequent `make tailscale` runs couldn't
# fix it because `tailscale set --hostname=rpi-k3s-1` is a no-op when
# HostName already equals rpi-k3s-1 — no rename RPC is sent, so the
# control plane never re-runs the collision check on the now-expired
# reservation. The stale `-1` DNSName persists forever.
#
# Fix: detect the drift (current DNSName short form != inventory_hostname)
# and force a two-step rename through a temp hostname, which DOES send
# the rename RPC on each hop and triggers a fresh collision check. On the
# way back to the clean name the control plane finds the reservation has
# expired, and grants the clean DNSName.
# ----------------------------------------------------------------------------
- name: Detect Tailscale DNSName short-form drift
  ansible.builtin.shell: |
    tailscale status --json 2>/dev/null | python3 -c "
    import json, sys
    d = json.load(sys.stdin)
    dns = d.get('Self', {}).get('DNSName', '').rstrip('.')
    print(dns.split('.', 1)[0] if dns else '')
    "
  register: ts_current_shortname
  changed_when: false
  failed_when: false
  tags: [tailscale, magicdns]

- name: Two-step rename to reclaim clean MagicDNS name (only when drifted)
  when:
    - ts_current_shortname.stdout | length > 0
    - ts_current_shortname.stdout != inventory_hostname
  block:
    - name: Rename to temp hostname
      ansible.builtin.command: >
        tailscale set --hostname={{ inventory_hostname }}-rename-temp
      changed_when: true

    - name: Pause for rename to propagate
      ansible.builtin.pause:
        seconds: 3

    - name: Rename back to clean inventory_hostname
      ansible.builtin.command: >
        tailscale set --hostname={{ inventory_hostname }}
      changed_when: true
  tags: [tailscale, magicdns]

- name: Configure Tailscale (regular node)
  ansible.builtin.command: >
    tailscale set
    --hostname={{ inventory_hostname }}
    --accept-routes=false
    --ssh
    --accept-risk=lose-ssh
  when: inventory_hostname not in groups['k3s_server']
  changed_when: true
  tags: [tailscale]

- name: Configure Tailscale as subnet router (server node)
  ansible.builtin.command: >
    tailscale set
    --hostname={{ inventory_hostname }}
    --advertise-routes={{ tailscale_subnet_routes }}
    --accept-routes=false
    --ssh
    --accept-risk=lose-ssh
  when: inventory_hostname in groups['k3s_server']
  changed_when: true
  tags: [tailscale]

- name: Authenticate Tailscale (regular node)
  ansible.builtin.command: >
    tailscale up
    --authkey={{ tailscale_auth_key }}
    --hostname={{ inventory_hostname }}
    --accept-routes=false
    --ssh
    --accept-risk=lose-ssh
  when:
    - tailscale_status.rc != 0 or (tailscale_status.stdout | from_json).BackendState != "Running"
    - inventory_hostname not in groups['k3s_server']
  changed_when: true
  tags: [tailscale]

- name: Authenticate Tailscale as subnet router (server node)
  ansible.builtin.command: >
    tailscale up
    --authkey={{ tailscale_auth_key }}
    --hostname={{ inventory_hostname }}
    --advertise-routes={{ tailscale_subnet_routes }}
    --accept-routes=false
    --ssh
    --accept-risk=lose-ssh
  when:
    - tailscale_status.rc != 0 or (tailscale_status.stdout | from_json).BackendState != "Running"
    - inventory_hostname in groups['k3s_server']
  changed_when: true
  tags: [tailscale]

- name: Assert accept-routes is false on cluster nodes
  ansible.builtin.shell: |
    tailscale debug prefs | python3 -c 'import sys,json; d=json.load(sys.stdin); sys.exit(1 if d.get("RouteAll") else 0)'
  when: inventory_hostname in groups['k3s_cluster']
  changed_when: false
  tags: [tailscale, assert]

- name: Ensure IP forwarding is enabled for subnet routing (server node)
  ansible.builtin.sysctl:
    name: "{{ item }}"
    value: "1"
    sysctl_file: /etc/sysctl.d/tailscale.conf
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding
  when: inventory_hostname in groups['k3s_server']
  tags: [tailscale, kernel]
