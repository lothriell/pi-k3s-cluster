---
# Common node preparation tasks for Raspberry Pi CM5 running Ubuntu 24.04 ARM64

- name: Disable unattended-upgrades (we manage updates via Ansible)
  ansible.builtin.systemd:
    name: unattended-upgrades
    enabled: false
    state: stopped
  failed_when: false
  tags: [packages]

- name: Update apt cache and upgrade all packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600
  tags: [packages]

- name: Set system timezone
  ansible.builtin.timezone:
    name: "{{ timezone | default('UTC') }}"
  tags: [system, timezone]

- name: Install common packages required for K3s and storage backends
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - apt-transport-https
      - ca-certificates
      - gnupg
      - open-iscsi          # Required for Longhorn distributed storage
      - nfs-common           # Required for NFS-based persistent volumes
      - jq
      - unzip
    state: present
  tags: [packages]

- name: Enable and start open-iscsi service for Longhorn support
  ansible.builtin.systemd:
    name: iscsid
    enabled: true
    state: started
  tags: [services]

# qemu-guest-agent is only useful on real KVM/Proxmox guests. Gate on
# ansible_system_vendor == "QEMU" rather than ansible_virtualization_type, because
# on ARM64 Raspberry Pi 5 the kernel reports virtualization_type=kvm (due to the
# hypervisor extensions in the boot chain) even though the Pi is bare metal.
# ansible_system_vendor is "" on the Pi and "QEMU" on Proxmox VMs.
# Proxmox side must also have 'agent: 1' in the VM config (qm set <vmid> --agent 1).
- name: Install qemu-guest-agent on KVM guests
  ansible.builtin.apt:
    name: qemu-guest-agent
    state: present
  when: ansible_system_vendor == "QEMU"
  tags: [packages, qemu-guest-agent]

- name: Start qemu-guest-agent on KVM guests
  ansible.builtin.systemd:
    name: qemu-guest-agent
    state: started
  when: ansible_system_vendor == "QEMU"
  tags: [services, qemu-guest-agent]

- name: Disable swap immediately (K3s/Kubernetes requirement)
  ansible.builtin.command: swapoff -a
  changed_when: false
  tags: [swap]

- name: Remove swap entries from /etc/fstab to persist across reboots
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^\s*([^#].*?\sswap\s.*)$'
    replace: '# \1'
  tags: [swap]

- name: Load required kernel modules for container networking
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter
  notify: reboot and wait
  register: kernel_modules_loaded
  tags: [kernel]

- name: Persist kernel modules across reboots via /etc/modules-load.d/k8s.conf
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      # Kernel modules required for Kubernetes networking
      overlay
      br_netfilter
    owner: root
    group: root
    mode: "0644"
  tags: [kernel]

- name: Set sysctl parameters for Kubernetes networking
  ansible.builtin.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: false
  loop:
    - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
    - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { key: "net.ipv4.ip_forward",                 value: "1" }
  tags: [kernel]

- name: Apply sysctl parameters without reboot
  ansible.builtin.command: sysctl --system
  changed_when: false
  tags: [kernel]

- name: Replace Ubuntu NTS-only NTP sources with reliable pool.ntp.org
  ansible.builtin.copy:
    dest: /etc/chrony/sources.d/ubuntu-ntp-pools.sources
    content: |
      # Replaced Ubuntu NTS pools — NTS requires TLS on port 4460 which
      # frequently times out and leaves Pis (no hardware RTC) without time sync.
      # Using plain NTP from pool.ntp.org instead (port 123/udp).
      pool 0.pool.ntp.org iburst maxsources 2
      pool 1.pool.ntp.org iburst maxsources 2
      pool 2.pool.ntp.org iburst maxsources 2
      pool 3.pool.ntp.org iburst maxsources 2
    owner: root
    group: root
    mode: "0644"
  notify: restart chrony
  tags: [ntp]

- name: Prevent cloud-init from overwriting /etc/hosts on reboot
  ansible.builtin.copy:
    dest: /etc/cloud/cloud.cfg.d/99-disable-manage-hosts.cfg
    content: |
      manage_etc_hosts: false
    owner: root
    group: root
    mode: "0644"
  tags: [system]

- name: Add Gitea registry to /etc/hosts (MetalLB Traefik IP)
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ metallb_ip_range.split('-')[0] }} {{ gitea_registry_host | default('gitea.' + (local_domain | default('homielab.local'))) }}"
    state: present
  tags: [system]

- name: Create K3s config directory for agents
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"
  tags: [registry]

- name: Configure K3s to use HTTP for Gitea container registry
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/registries.yaml
    content: |
      mirrors:
        {{ gitea_registry_host | default('gitea.' + (local_domain | default('homielab.local'))) }}:
          endpoint:
            - "http://{{ gitea_registry_host | default('gitea.' + (local_domain | default('homielab.local'))) }}"
    owner: root
    group: root
    mode: "0644"
  tags: [registry]

- name: Allow larger initial clock step for Pis without hardware RTC
  ansible.builtin.lineinfile:
    path: /etc/chrony/chrony.conf
    regexp: '^makestep'
    line: "makestep 1 -1"
  notify: restart chrony
  tags: [ntp]
