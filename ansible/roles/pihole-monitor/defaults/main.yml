---
# Pi-hole DNS monitor configuration

# ntfy server
ntfy_port: 8080
ntfy_topic: dns-alerts

# Pihole log path (host-mounted from Docker container)
pihole_log_dir: /var/log/pihole
pihole_log_file: "{{ pihole_log_dir }}/pihole.log"

# Monitor config directory
monitor_config_dir: /etc/pihole-monitor

# Alert rules file (gitignored, lives in secrets/)
# Edit locally or directly on athena at /etc/pihole-monitor/alert-rules.conf
monitor_alert_rules_file: "{{ playbook_dir }}/../../secrets/pihole-alert-rules.conf"

# Promtail config (ships ALL logs to Loki, not just alerts)
promtail_port: 9080
loki_url: "http://loki.monitoring.svc.cluster.local:3100"
