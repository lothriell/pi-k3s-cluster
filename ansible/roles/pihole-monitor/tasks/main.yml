---
# Pi-hole DNS monitor: ntfy + alerting script + Promtail → Loki

# -- Mount pihole log volume to host ----------------------------------------

- name: Check Pi-hole container state (log mount + TZ env)
  ansible.builtin.shell: |
    set -e
    MOUNT_OK=no
    TZ_OK=no
    if sudo docker inspect pihole --format '{{ '{{' }}json .Mounts{{ '}}' }}' | grep -q '/var/log/pihole'; then
      MOUNT_OK=yes
    fi
    if sudo docker inspect pihole --format '{{ '{{' }}range .Config.Env{{ '}}' }}{{ '{{' }}println .{{ '}}' }}{{ '{{' }}end{{ '}}' }}' \
        | grep -q '^TZ={{ pihole_container_tz }}$'; then
      TZ_OK=yes
    fi
    if [ "$MOUNT_OK" = yes ] && [ "$TZ_OK" = yes ]; then
      echo OK
    else
      echo "NEEDS_RECREATE mount=$MOUNT_OK tz=$TZ_OK"
    fi
  register: pihole_container_check
  changed_when: false

- name: Stop Pi-hole container for recreate
  ansible.builtin.command: sudo docker stop pihole
  when: "'NEEDS_RECREATE' in pihole_container_check.stdout"

- name: Create host log directory
  ansible.builtin.file:
    path: "{{ pihole_log_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Recreate Pi-hole container with log volume and TZ
  ansible.builtin.shell: |
    # Preserve the currently-running image tag across the recreate
    CURRENT_IMAGE=$(sudo docker inspect pihole --format '{{ '{{' }}.Config.Image{{ '}}' }}')
    sudo docker rm pihole
    sudo docker run -d \
      --name pihole \
      --restart unless-stopped \
      -p 53:53/tcp -p 53:53/udp \
      -p 67:67/udp -p 547:547/udp \
      -p 8800:80/tcp \
      -e TZ={{ pihole_container_tz }} \
      -v /DATA/AppData/pihole/etc/pihole:/etc/pihole \
      -v /DATA/AppData/pihole/etc/dnsmasq.d:/etc/dnsmasq.d \
      -v {{ pihole_log_dir }}:/var/log/pihole \
      "$CURRENT_IMAGE"
  when: "'NEEDS_RECREATE' in pihole_container_check.stdout"

- name: Wait for Pi-hole to be healthy
  ansible.builtin.command: sudo docker exec pihole pihole status
  register: pihole_status
  retries: 10
  delay: 5
  until: pihole_status.rc == 0
  changed_when: false
  when: "'NEEDS_RECREATE' in pihole_container_check.stdout"

# -- Config directory -------------------------------------------------------

- name: Create monitor config directory
  ansible.builtin.file:
    path: "{{ monitor_config_dir }}"
    state: directory
    mode: "0755"
  become: true

# -- Deploy monitoring script -----------------------------------------------

- name: Deploy DNS monitor script
  ansible.builtin.template:
    src: pihole-dns-monitor.py.j2
    dest: /usr/local/bin/pihole-dns-monitor
    mode: "0755"
  become: true
  notify: restart pihole-dns-monitor

- name: Deploy alert rules config from local secrets file
  ansible.builtin.copy:
    src: "{{ monitor_alert_rules_file }}"
    dest: "{{ monitor_config_dir }}/alert-rules.conf"
    mode: "0644"
  become: true
  notify: reload pihole-dns-monitor

# -- Deploy systemd service -------------------------------------------------

- name: Deploy monitor systemd service
  ansible.builtin.template:
    src: pihole-dns-monitor.service.j2
    dest: /etc/systemd/system/pihole-dns-monitor.service
    mode: "0644"
  become: true
  notify: restart pihole-dns-monitor

- name: Enable and start monitor service
  ansible.builtin.systemd:
    name: pihole-dns-monitor
    enabled: true
    state: started
    daemon_reload: true
  become: true

# -- Deploy ntfy (self-hosted with auth + Cloudflare tunnel) -----------------

- name: Create ntfy config directory
  ansible.builtin.file:
    path: /etc/ntfy
    state: directory
    mode: "0755"
  become: true

- name: Deploy ntfy server config
  ansible.builtin.template:
    src: ntfy-server.yml.j2
    dest: /etc/ntfy/server.yml
    mode: "0644"
  become: true

- name: Stop and remove existing ntfy container
  ansible.builtin.shell: sudo docker stop ntfy 2>/dev/null; sudo docker rm ntfy 2>/dev/null; true
  changed_when: false

- name: Start ntfy container with auth
  ansible.builtin.shell: |
    sudo docker run -d --name ntfy --restart unless-stopped \
      -p {{ ntfy_port }}:80 \
      -v ntfy-cache:/var/cache/ntfy \
      -v /etc/ntfy:/etc/ntfy:ro \
      -v ntfy-auth:/var/lib/ntfy \
      -e TZ=UTC \
      binwiederhier/ntfy:latest serve --config /etc/ntfy/server.yml
  changed_when: false

- name: Wait for ntfy to start
  ansible.builtin.uri:
    url: "http://localhost:{{ ntfy_port }}/v1/health"
    method: GET
    status_code: 200
  register: ntfy_health
  retries: 5
  delay: 3
  until: ntfy_health.status == 200

- name: Create ntfy admin user (idempotent)
  ansible.builtin.shell: |
    echo -e "{{ ntfy_admin_password }}\n{{ ntfy_admin_password }}" | \
      sudo docker exec -i ntfy ntfy user add --role=admin {{ ntfy_admin_user }} 2>&1 || \
    echo "user already exists (OK)"
  changed_when: false

- name: Allow anonymous write on alert topic (for local monitor script)
  ansible.builtin.shell: |
    sudo docker exec ntfy ntfy access everyone {{ ntfy_topic }} write 2>&1 || true
  changed_when: false

- name: Check if alertmanager ntfy user exists
  ansible.builtin.shell: |
    sudo docker exec ntfy ntfy user list {{ ntfy_alertmanager_user }} 2>/dev/null \
      | grep -q "^user {{ ntfy_alertmanager_user }} "
  register: ntfy_alertmanager_user_check
  changed_when: false
  failed_when: false

- name: Create dedicated ntfy user for K8s Alertmanager
  ansible.builtin.shell: |
    printf '%s\n%s\n' '{{ ntfy_alertmanager_password }}' '{{ ntfy_alertmanager_password }}' \
      | sudo docker exec -i ntfy ntfy user add {{ ntfy_alertmanager_user }}
  when: ntfy_alertmanager_user_check.rc != 0

- name: Grant write-only access for alertmanager user on k8s-alerts topic
  ansible.builtin.command: >
    sudo docker exec ntfy ntfy access
    {{ ntfy_alertmanager_user }} {{ ntfy_k8s_alerts_topic }} write-only
  register: ntfy_alertmanager_acl
  changed_when: "'granted' in ntfy_alertmanager_acl.stdout"

# -- Deploy Promtail ---------------------------------------------------------

- name: Deploy Promtail config
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: "{{ monitor_config_dir }}/promtail-config.yml"
    mode: "0644"
  become: true

# Persist the Promtail positions file outside /tmp. On athena's old
# Docker, the container's root fs uses tmpfs-ish semantics and anything
# under /tmp is wiped on restart — which causes Promtail to re-read
# pihole.log from offset 0 and replay the entire file with NOW()
# timestamps. Bind-mount a host directory under /var/lib/promtail to
# make positions survive container restarts.
- name: Create Promtail positions host directory
  ansible.builtin.file:
    path: /var/lib/promtail
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Stop and remove existing Promtail container
  ansible.builtin.shell: sudo docker stop promtail 2>/dev/null; sudo docker rm promtail 2>/dev/null; true
  changed_when: false

- name: Start Promtail container
  ansible.builtin.shell: |
    sudo docker run -d --name promtail --restart unless-stopped \
      -v {{ pihole_log_dir }}:/var/log/pihole:ro \
      -v {{ monitor_config_dir }}/promtail-config.yml:/etc/promtail/config.yml:ro \
      -v /var/lib/promtail:/var/lib/promtail \
      -v /etc/localtime:/etc/localtime:ro \
      grafana/promtail:latest -config.file=/etc/promtail/config.yml
  changed_when: false

# -- Verify ------------------------------------------------------------------

- name: Verify ntfy is healthy
  ansible.builtin.uri:
    url: "http://localhost:{{ ntfy_port }}/v1/health"
    method: GET
    status_code: 200

- name: Verify monitor service is running
  ansible.builtin.systemd:
    name: pihole-dns-monitor
  register: monitor_status
  failed_when: monitor_status.status.ActiveState != "active"

- name: Send test notification
  ansible.builtin.uri:
    url: "http://localhost:{{ ntfy_port }}/{{ ntfy_topic }}"
    method: POST
    body: "Pi-hole DNS monitor deployed successfully"
    headers:
      Title: "Monitor Deployed"
      Priority: "default"
      Tags: "white_check_mark"
    status_code: 200

- name: Display status
  ansible.builtin.debug:
    msg: |
      Pi-hole DNS Monitor deployed:
        - ntfy: {{ ntfy_base_url }}/{{ ntfy_topic }} (auth: {{ ntfy_admin_user }})
        - Monitor: systemctl status pihole-dns-monitor
        - Rules: {{ monitor_config_dir }}/alert-rules.conf
        - Logs: Grafana → Explore → Loki → {job="pihole"}
        - Reload: sudo systemctl reload pihole-dns-monitor
