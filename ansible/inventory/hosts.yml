---
# Raspberry Pi CM5 K3s Cluster Inventory
# Update the ansible_host IPs to match your network configuration.

all:
  vars:
    # K3s version to install across all nodes
    k3s_version: "v1.31.4+k3s1"

    # MetalLB IP address range for LoadBalancer services
    # Adjust this range to a set of unused IPs on your LAN
    metallb_ip_range: "192.168.1.200-192.168.1.220"

    # Timezone for all nodes
    timezone: "UTC"

    # K3s server endpoint (must match pi-k3s-1 IP)
    k3s_server_ip: "192.168.1.101"
    k3s_server_url: "https://192.168.1.101:6443"

  children:
    k3s_server:
      hosts:
        pi-k3s-1:
          ansible_host: 192.168.1.101

    k3s_agents:
      hosts:
        pi-k3s-2:
          ansible_host: 192.168.1.102
        pi-k3s-3:
          ansible_host: 192.168.1.103
        pi-k3s-4:
          ansible_host: 192.168.1.104

    k3s_cluster:
      children:
        k3s_server:
        k3s_agents:
