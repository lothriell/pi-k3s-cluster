---
# Raspberry Pi CM5 K3s Cluster Inventory
# Update the ansible_host IPs to match your network configuration.

all:
  vars:
    # K3s version to install across all nodes
    k3s_version: "v1.31.4+k3s1"

    # MetalLB IP address range for LoadBalancer services
    # Adjust this range to a set of unused IPs on your LAN
    metallb_ip_range: "10.69.20.100-10.69.20.110"

    # Timezone for all nodes
    timezone: "UTC"

    # K3s server endpoint (rpi-k3s-1 is control plane, temporarily on rpi-k3s-2)
    k3s_server_ip: "10.69.20.12"
    k3s_server_url: "https://10.69.20.12:6443"

    # Personal user account (used for bootstrap only)
    # TODO CHANGEME — set to your personal username on the Pi nodes
    personal_user: myuser

    # Python interpreter (Ubuntu 25.10 ships 3.13)
    ansible_python_interpreter: /usr/bin/python3

    # Tailscale configuration
    tailscale_auth_key: "{{ lookup('file', playbook_dir + '/../../secrets/tailscale-auth-key') | trim }}"
    tailscale_subnet_routes: "10.69.20.0/24"

  children:
    k3s_server:
      hosts:
        rpi-k3s-2:
          ansible_host: 10.69.20.12

    k3s_agents:
      hosts:
        rpi-k3s-1:
          ansible_host: 10.69.20.11
        rpi-k3s-3:
          ansible_host: 10.69.20.13
        rpi-k3s-4:
          ansible_host: 10.69.20.14

    k3s_cluster:
      children:
        k3s_server:
        k3s_agents:
