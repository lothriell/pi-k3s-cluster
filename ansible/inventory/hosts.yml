---
# Raspberry Pi CM5 K3s Cluster Inventory
#
# Environment-specific values (IPs, username, etc.) are in:
#   ansible/inventory/group_vars/all.yml (gitignored)
#
# To set up: cp group_vars/all.yml.example group_vars/all.yml

all:
  vars:
    k3s_version: "v1.34.6+k3s1"
    # timezone is set in group_vars/all/main.yml (file group_vars override inline)
    ansible_python_interpreter: /usr/bin/python3

  children:
    # HA control plane: 3 Pi nodes with embedded etcd.
    # First host in group runs `--cluster-init`; subsequent hosts join via
    # the first server's IP (kube-vip isn't up yet during bootstrap).
    # Client traffic (kubectl, agents, ArgoCD) hits the VIP (k3s_api_vip).
    k3s_server:
      hosts:
        rpi-k3s-1:
          ansible_host: "{{ node_ip_1 }}"
        rpi-k3s-2:
          ansible_host: "{{ node_ip_2 }}"
        rpi-k3s-3:
          ansible_host: "{{ node_ip_3 }}"

    k3s_agents:
      hosts:
        rpi-k3s-4:
          ansible_host: "{{ node_ip_4 }}"

    k3s_x86_agents:
      hosts:
        k3s-x86-1:
          ansible_host: "{{ x86_node_ip_1 }}"
        k3s-x86-2:
          ansible_host: "{{ x86_node_ip_2 }}"

    k3s_cluster:
      children:
        k3s_server:
        k3s_agents:
        k3s_x86_agents:

    gpu_servers:
      hosts:
        gpu-1:
          ansible_host: "{{ gpu_node_ip_1 }}"

    sff_nodes:
      hosts:
        athena:
          ansible_host: "{{ sff_athena_ip }}"
        artemis:
          ansible_host: "{{ sff_artemis_ip }}"
        minisforum-c:
          ansible_host: "{{ sff_minisforum_ip }}"

    desktops:
      hosts:
        arch-t-01:
          ansible_host: "{{ tailscale_arch_t_01 }}"
        cachy-t-01:
          ansible_host: "{{ tailscale_cachy_t_01 }}"

    # macOS nodes — bootstrapped outside of the numbered playbooks (macOS has no
    # adduser/usermod). Not part of the K3s cluster; kept as a managed host
    # because it has LAN reach to the remote Servers VLAN and can act as a
    # jump host (ProxyJump) to workloads that the controller cannot reach.
    macos_nodes:
      hosts:
        macmini:
          ansible_host: "{{ tailscale_macmini }}"

    # Standalone security VMs (not K3s). Reached via Tailscale from the
    # controller; ansible user + sudo provisioned manually during recovery.
    security_stack:
      hosts:
        wazuh-server:
          ansible_host: "{{ tailscale_wazuh_server }}"
