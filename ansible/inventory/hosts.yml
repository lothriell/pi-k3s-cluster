---
# Raspberry Pi CM5 K3s Cluster Inventory
#
# Environment-specific values (IPs, username, etc.) are in:
#   ansible/inventory/group_vars/all.yml (gitignored)
#
# To set up: cp group_vars/all.yml.example group_vars/all.yml

all:
  vars:
    k3s_version: "v1.31.4+k3s1"
    timezone: "UTC"
    ansible_python_interpreter: /usr/bin/python3

  children:
    k3s_server:
      hosts:
        rpi-k3s-1:
          ansible_host: "{{ node_ip_1 }}"

    k3s_agents:
      hosts:
        rpi-k3s-2:
          ansible_host: "{{ node_ip_2 }}"
        rpi-k3s-3:
          ansible_host: "{{ node_ip_3 }}"
        rpi-k3s-4:
          ansible_host: "{{ node_ip_4 }}"

    k3s_x86_agents:
      hosts:
        k3s-x86-1:
          ansible_host: "{{ x86_node_ip_1 }}"
        k3s-x86-2:
          ansible_host: "{{ x86_node_ip_2 }}"

    k3s_cluster:
      children:
        k3s_server:
        k3s_agents:
        k3s_x86_agents:

    sff_nodes:
      hosts:
        athena:
          ansible_host: "{{ sff_athena_ip }}"
        artemis:
          ansible_host: "{{ sff_artemis_ip }}"
        minisforum-c:
          ansible_host: "{{ sff_minisforum_ip }}"
