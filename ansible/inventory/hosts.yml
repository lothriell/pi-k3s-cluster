---
# Raspberry Pi CM5 K3s Cluster Inventory
# Update the ansible_host IPs to match your network configuration.

all:
  vars:
    # K3s version to install across all nodes
    k3s_version: "v1.31.4+k3s1"

    # MetalLB IP address range for LoadBalancer services
    # Adjust this range to a set of unused IPs on your LAN
    metallb_ip_range: "10.0.0.100-10.0.0.110"

    # Timezone for all nodes
    timezone: "UTC"

    # K3s server endpoint (must match rpi-k3s-1 IP)
    k3s_server_ip: "10.0.0.11"
    k3s_server_url: "https://10.0.0.11:6443"

    # Python interpreter (Ubuntu 25.10 ships 3.13)
    ansible_python_interpreter: /usr/bin/python3

  children:
    k3s_server:
      hosts:
        rpi-k3s-1:
          ansible_host: 10.0.0.11

    k3s_agents:
      hosts:
        rpi-k3s-2:
          ansible_host: 10.0.0.12
        rpi-k3s-3:
          ansible_host: 10.0.0.13
        rpi-k3s-4:
          ansible_host: 10.0.0.14

    k3s_cluster:
      children:
        k3s_server:
        k3s_agents:
