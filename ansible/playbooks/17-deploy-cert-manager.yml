---
# Playbook: Deploy cert-manager + internal CA chain
# =============================================================================
# Replaces the shell-based `make cert-manager` target. Adds DR survivability:
# if vault.yml has `homielab_ca_cert` + `homielab_ca_key`, this seeds the
# `cert-manager/homielab-ca-tls` Secret BEFORE the Certificate CR runs, so
# cert-manager adopts the existing CA instead of generating a fresh one
# (the Certificate has rotationPolicy=Never to make this stable).
#
# After first install, capture the live CA back into vault.yml with:
#   make ca-backup
#
# Usage:
#   make cert-manager
# =============================================================================

- name: Deploy cert-manager + homielab-internal CA chain
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    helm_repo_url: https://charts.jetstack.io
    cert_manager_ns: cert-manager
    ca_secret_name: homielab-ca-tls

  tasks:
    - name: Add jetstack Helm repo (idempotent)
      ansible.builtin.command: helm repo add jetstack {{ helm_repo_url }}
      register: helm_repo_add
      changed_when: "'has been added' in helm_repo_add.stdout"
      failed_when:
        - helm_repo_add.rc != 0
        - "'already exists' not in helm_repo_add.stderr"

    - name: Update helm repos
      ansible.builtin.command: helm repo update jetstack
      changed_when: false

    - name: Install cert-manager
      ansible.builtin.command: >-
        helm upgrade --install cert-manager jetstack/cert-manager
        -n {{ cert_manager_ns }}
        --create-namespace
        --set crds.enabled=true
        --wait
      register: helm_install
      changed_when: "'has been upgraded' in helm_install.stdout or 'has been installed' in helm_install.stdout"

    - name: Wait for cert-manager webhook to be Ready
      ansible.builtin.command: >-
        kubectl -n {{ cert_manager_ns }} rollout status deploy/cert-manager-webhook --timeout=120s
      changed_when: false

    # -- DR pre-seed --------------------------------------------------------
    # If vault holds a previous-run CA, drop it into the secret BEFORE the
    # Certificate CR runs. cert-manager's adoption logic (rotationPolicy:
    # Never) keeps the seeded cert/key on subsequent reconciles.

    - name: Detect vault-stored CA material
      ansible.builtin.set_fact:
        ca_in_vault: "{{ (homielab_ca_cert is defined) and (homielab_ca_key is defined) and homielab_ca_cert | length > 0 and homielab_ca_key | length > 0 }}"

    - name: Pre-seed homielab-ca-tls secret from vault (DR path)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          type: kubernetes.io/tls
          metadata:
            name: "{{ ca_secret_name }}"
            namespace: "{{ cert_manager_ns }}"
            annotations:
              <local-domain>.<cf-zone>/source: "vault.yml (homielab_ca_cert / homielab_ca_key)"
          stringData:
            tls.crt: "{{ homielab_ca_cert }}"
            tls.key: "{{ homielab_ca_key }}"
            ca.crt: "{{ homielab_ca_cert }}"
      when: ca_in_vault

    - name: Note when CA secret will be freshly generated
      ansible.builtin.debug:
        msg: |
          No CA in vault.yml — cert-manager will GENERATE a fresh root CA on
          first reconcile. After it lands, run `make ca-backup` to capture
          it into vault.yml so a future cluster rebuild can restore the same
          root and skip the per-device re-trust step.
      when: not ca_in_vault

    # -- ClusterIssuer chain ------------------------------------------------

    - name: Apply ClusterIssuer chain
      ansible.builtin.command: kubectl apply -f {{ playbook_dir }}/../../k8s/cert-manager/cluster-issuer.yml
      register: ci_apply
      changed_when: "'configured' in ci_apply.stdout or 'created' in ci_apply.stdout"

    - name: Wait for homielab-internal ClusterIssuer to be Ready
      ansible.builtin.command: >-
        kubectl wait --for=condition=Ready clusterissuer/homielab-internal --timeout=120s
      changed_when: false

    - name: Show CA fingerprint
      ansible.builtin.shell: |
        kubectl -n {{ cert_manager_ns }} get secret {{ ca_secret_name }} \
          -o jsonpath='{.data.ca\.crt}' | base64 -d \
          | openssl x509 -noout -subject -issuer -fingerprint -sha256 -dates
      register: ca_info
      changed_when: false

    - name: Report
      ansible.builtin.debug:
        msg: |
          cert-manager + CA chain deployed.
          Source: {{ 'vault (DR pre-seed)' if ca_in_vault else 'freshly generated' }}
          {{ ca_info.stdout_lines | join('\n          ') }}
