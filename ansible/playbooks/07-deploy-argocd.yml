---
# Playbook 07: Deploy ArgoCD GitOps continuous delivery
# Deploys via Helm from localhost using a custom values file.
#
# Usage: ansible-playbook playbooks/07-deploy-argocd.yml

- name: Deploy ArgoCD to the K3s cluster
  hosts: localhost
  connection: local
  become: false
  gather_facts: false

  vars:
    argocd_values: "{{ playbook_dir }}/../../k8s/argocd/values-argocd.yml"

  tasks:
    # -- Namespace ---------------------------------------------------------------

    - name: Create argocd namespace
      ansible.builtin.command: >
        kubectl create namespace argocd --dry-run=client -o yaml
      register: ns_manifest
      changed_when: false
      tags: [argocd]

    - name: Apply argocd namespace
      ansible.builtin.shell: >
        echo "{{ ns_manifest.stdout }}" | kubectl apply -f -
      changed_when: false
      tags: [argocd]

    # -- Helm repo ---------------------------------------------------------------

    - name: Add Argo Helm repository
      ansible.builtin.command: >
        helm repo add argo https://argoproj.github.io/argo-helm
      register: helm_repo
      changed_when: "'has been added' in helm_repo.stdout"
      failed_when: false
      tags: [argocd]

    - name: Update Helm repositories
      ansible.builtin.command: helm repo update
      changed_when: false
      tags: [argocd]

    # -- ArgoCD ------------------------------------------------------------------

    - name: Deploy ArgoCD via Helm
      ansible.builtin.command: >
        helm upgrade --install argocd
        argo/argo-cd
        --namespace argocd
        --values {{ argocd_values }}
        --wait
        --timeout 10m
      register: argocd_deploy
      changed_when: "'STATUS: deployed' in argocd_deploy.stdout"
      tags: [argocd]

    - name: Wait for ArgoCD pods to be ready
      ansible.builtin.command: >
        kubectl wait --for=condition=Ready pods
        --all --namespace argocd
        --timeout=300s
      changed_when: false
      tags: [argocd]

    # -- Summary -----------------------------------------------------------------

    - name: Show ArgoCD pod status
      ansible.builtin.command: kubectl get pods -n argocd -o wide
      register: argocd_pods
      changed_when: false
      tags: [verify]

    - name: Display ArgoCD pods
      ansible.builtin.debug:
        var: argocd_pods.stdout_lines
      tags: [verify]

    - name: Show ArgoCD initial admin password
      ansible.builtin.shell: >
        kubectl -n argocd get secret argocd-initial-admin-secret
        -o jsonpath="{.data.password}" | base64 --decode
      register: argocd_password
      changed_when: false
      failed_when: false
      tags: [verify]

    - name: Display ArgoCD admin password
      ansible.builtin.debug:
        msg: "ArgoCD admin password: {{ argocd_password.stdout }}"
      when: argocd_password.rc == 0
      tags: [verify]
