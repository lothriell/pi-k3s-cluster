---
# Playbook 07: Deploy ArgoCD GitOps continuous delivery
# Deploys via Helm from localhost using a custom values file.
#
# Usage: ansible-playbook playbooks/07-deploy-argocd.yml

- name: Deploy ArgoCD to the K3s cluster
  hosts: localhost
  connection: local
  become: false
  gather_facts: false

  vars:
    argocd_values: "{{ playbook_dir }}/../../k8s/argocd/values-argocd.yml"

  tasks:
    # -- Namespace ---------------------------------------------------------------

    - name: Create argocd namespace
      ansible.builtin.command: >
        kubectl create namespace argocd --dry-run=client -o yaml
      register: ns_manifest
      changed_when: false
      tags: [argocd]

    - name: Apply argocd namespace
      ansible.builtin.shell: >
        echo "{{ ns_manifest.stdout }}" | kubectl apply -f -
      changed_when: false
      tags: [argocd]

    # -- Helm repo ---------------------------------------------------------------

    - name: Add Argo Helm repository
      ansible.builtin.command: >
        helm repo add argo https://argoproj.github.io/argo-helm
      register: helm_repo
      changed_when: "'has been added' in helm_repo.stdout"
      failed_when: false
      tags: [argocd]

    - name: Update Helm repositories
      ansible.builtin.command: helm repo update
      changed_when: false
      tags: [argocd]

    # -- ArgoCD admin password ---------------------------------------------------

    - name: Generate bcrypt hash of ArgoCD admin password
      ansible.builtin.command: >
        htpasswd -nbBC 10 "" {{ argocd_admin_password }}
      register: argocd_bcrypt
      changed_when: false
      tags: [argocd]

    - name: Set bcrypt hash fact
      ansible.builtin.set_fact:
        argocd_password_hash: "{{ argocd_bcrypt.stdout | regex_replace('^:', '') }}"
      tags: [argocd]

    # -- ArgoCD ------------------------------------------------------------------

    - name: Deploy ArgoCD via Helm
      ansible.builtin.command: >
        helm upgrade --install argocd
        argo/argo-cd
        --namespace argocd
        --values {{ argocd_values }}
        --set configs.secret.argocdServerAdminPassword={{ argocd_password_hash }}
        --wait
        --timeout 10m
      register: argocd_deploy
      changed_when: "'STATUS: deployed' in argocd_deploy.stdout"
      tags: [argocd]

    - name: Wait for ArgoCD pods to be ready
      ansible.builtin.command: >
        kubectl wait --for=condition=Ready pods
        --all --namespace argocd
        --timeout=300s
      changed_when: false
      tags: [argocd]

    # -- Gitea repo credentials for ArgoCD -------------------------------------

    - name: Create Gitea repository secret for ArgoCD
      ansible.builtin.shell: |
        kubectl apply -f - <<'EOF'
        apiVersion: v1
        kind: Secret
        metadata:
          name: gitea-repo-creds
          namespace: argocd
          labels:
            argocd.argoproj.io/secret-type: repository
        type: Opaque
        stringData:
          type: git
          url: http://gitea-http.gitea.svc.cluster.local:3000
          username: {{ gitea_admin_user }}
          password: {{ gitea_admin_password }}
        EOF
      changed_when: false
      tags: [argocd]

    # -- Summary -----------------------------------------------------------------

    - name: Show ArgoCD pod status
      ansible.builtin.command: kubectl get pods -n argocd -o wide
      register: argocd_pods
      changed_when: false
      tags: [verify]

    - name: Display ArgoCD pods
      ansible.builtin.debug:
        var: argocd_pods.stdout_lines
      tags: [verify]

    - name: Display ArgoCD admin credentials
      ansible.builtin.debug:
        msg: "ArgoCD admin login: admin / {{ argocd_admin_password }}"
      tags: [verify]
