---
# Playbook 04: Deploy monitoring stack (Prometheus + Grafana)
# Deploys via Helm from localhost using custom values files.
# Values files should be placed under ../helm-values/ before running.
#
# Usage: ansible-playbook playbooks/04-deploy-monitoring.yml

- name: Deploy monitoring stack to the K3s cluster
  hosts: localhost
  connection: local
  become: false
  gather_facts: false

  vars:
    prometheus_values_template: "{{ playbook_dir }}/../../k8s/monitoring/values-prometheus.yml.j2"
    prometheus_values_rendered: "/tmp/values-prometheus.rendered.yml"
    grafana_values: "{{ playbook_dir }}/../../k8s/monitoring/values-grafana.yml"
    alertmanager_ntfy_template: "{{ playbook_dir }}/../../k8s/monitoring/alertmanager-ntfy.yml.j2"
    alertmanager_ntfy_rendered: "/tmp/alertmanager-ntfy.rendered.yml"

  tasks:
    # -- Prometheus ------------------------------------------------------------

    - name: Ensure monitoring namespace exists
      ansible.builtin.command: kubectl create namespace monitoring --dry-run=client -o yaml
      register: ns_yaml
      changed_when: false
      tags: [prometheus]

    - name: Apply monitoring namespace
      ansible.builtin.command: kubectl apply -f -
      args:
        stdin: "{{ ns_yaml.stdout }}"
      changed_when: false
      tags: [prometheus]

    - name: Render Prometheus values from template
      ansible.builtin.template:
        src: "{{ prometheus_values_template }}"
        dest: "{{ prometheus_values_rendered }}"
        mode: "0600"
      tags: [prometheus]

    - name: Deploy Prometheus via Helm
      ansible.builtin.command: >
        helm upgrade --install prometheus
        prometheus-community/prometheus
        --namespace monitoring
        --values {{ prometheus_values_rendered }}
        --wait
        --timeout 10m
      register: prometheus_deploy
      changed_when: "'STATUS: deployed' in prometheus_deploy.stdout"
      tags: [prometheus]

    - name: Remove rendered values file (contains secrets)
      ansible.builtin.file:
        path: "{{ prometheus_values_rendered }}"
        state: absent
      tags: [prometheus]

    - name: Wait for Prometheus pods to be ready
      ansible.builtin.command: >
        kubectl wait --for=condition=Ready pods
        --all --namespace monitoring
        --timeout=300s
      changed_when: false
      tags: [prometheus]

    # Kubelet can take ~60s to propagate an updated ConfigMap into the
    # prometheus-server pod's /etc/config mount. The configmap-reload sidecar
    # fires on the API-level change, often BEFORE the file inside the pod has
    # updated, so the first reload reads stale content and rule changes get
    # missed until the next unrelated restart. Force a second reload once the
    # file has definitely propagated to guarantee rule/alert changes land.
    - name: Wait for ConfigMap to propagate into Prometheus pod
      ansible.builtin.pause:
        seconds: 75
      tags: [prometheus]

    - name: Trigger a second Prometheus config reload (post-propagation)
      ansible.builtin.shell: |
        kubectl -n monitoring exec deploy/prometheus-server -c prometheus-server -- \
          wget -qO- --post-data= http://localhost:9090/-/reload
      changed_when: false
      tags: [prometheus]

    # -- alertmanager-ntfy bridge ----------------------------------------------
    # Formats Alertmanager webhook JSON into nice ntfy notifications. Must be
    # ready before Alertmanager fires anything, hence its place between the
    # Prometheus and Grafana steps.
    #
    # Rollout model: a `checksum/config` annotation on the pod template carries
    # a sha256 of (the raw template file + all vault inputs). When anything
    # drifts, the annotation changes, and Kubernetes's native Deployment
    # reconciliation rolls the pod. No explicit `kubectl rollout restart`.
    # Ansible `changed` is driven by a before/after comparison of the live
    # deployment's annotation so `-v` output accurately reflects reality.

    - name: Read currently-deployed alertmanager-ntfy config checksum
      ansible.builtin.shell: |
        kubectl -n monitoring get deployment alertmanager-ntfy \
          -o jsonpath='{.spec.template.metadata.annotations.checksum/config}' 2>/dev/null || true
      register: anf_deployed_checksum
      changed_when: false
      failed_when: false
      tags: [alertmanager-ntfy]

    - name: Compute alertmanager-ntfy config checksum (template + vault inputs)
      ansible.builtin.set_fact:
        alertmanager_ntfy_checksum: >-
          {{
            (
              lookup('file', alertmanager_ntfy_template)
              + ntfy_alertmanager_user
              + ntfy_alertmanager_password
              + ntfy_base_url
              + ntfy_k8s_alerts_topic
            ) | hash('sha256')
          }}
      tags: [alertmanager-ntfy]

    - name: Render alertmanager-ntfy manifest from template
      ansible.builtin.template:
        src: "{{ alertmanager_ntfy_template }}"
        dest: "{{ alertmanager_ntfy_rendered }}"
        mode: "0600"
      register: anf_render
      tags: [alertmanager-ntfy]

    - name: Apply alertmanager-ntfy manifest
      ansible.builtin.command: kubectl apply -f {{ alertmanager_ntfy_rendered }}
      register: anf_apply
      changed_when: alertmanager_ntfy_checksum != anf_deployed_checksum.stdout
      tags: [alertmanager-ntfy]

    - name: Remove rendered alertmanager-ntfy manifest (contains secrets)
      ansible.builtin.file:
        path: "{{ alertmanager_ntfy_rendered }}"
        state: absent
      tags: [alertmanager-ntfy]

    - name: Wait for alertmanager-ntfy to be ready
      ansible.builtin.command: >
        kubectl rollout status deployment/alertmanager-ntfy
        --namespace monitoring
        --timeout=120s
      changed_when: false
      tags: [alertmanager-ntfy]

    # -- Grafana ---------------------------------------------------------------

    - name: Deploy Grafana via Helm
      ansible.builtin.command: >
        helm upgrade --install grafana
        grafana/grafana
        --namespace monitoring
        --values {{ grafana_values }}
        --take-ownership
        --wait
        --timeout 10m
      register: grafana_deploy
      changed_when: "'STATUS: deployed' in grafana_deploy.stdout"
      tags: [grafana]

    - name: Wait for Grafana pods to be ready
      ansible.builtin.command: >
        kubectl wait --for=condition=Ready pods
        -l app.kubernetes.io/name=grafana
        --namespace monitoring
        --timeout=300s
      changed_when: false
      tags: [grafana]

    # -- Grafana dashboards (auto-discovered by Grafana sidecar) --------------

    - name: Deploy Trivy Operator Grafana dashboard
      ansible.builtin.shell: |
        kubectl create configmap trivy-operator-dashboard \
          --namespace monitoring \
          --from-file=trivy-operator.json={{ playbook_dir }}/../../k8s/monitoring/dashboards/trivy-operator.json \
          --dry-run=client -o yaml | \
        kubectl label --local -f - grafana_dashboard=1 -o yaml --dry-run=client | \
        kubectl apply -f -
      register: trivy_dashboard
      changed_when: "'configured' in trivy_dashboard.stdout"
      tags: [grafana, trivy]

    - name: Deploy Alerts overview Grafana dashboard
      ansible.builtin.shell: |
        kubectl create configmap alerts-dashboard \
          --namespace monitoring \
          --from-file=alerts.json={{ playbook_dir }}/../../k8s/monitoring/dashboards/alerts.json \
          --dry-run=client -o yaml | \
        kubectl label --local -f - grafana_dashboard=1 -o yaml --dry-run=client | \
        kubectl apply -f -
      register: alerts_dashboard
      changed_when: "'configured' in alerts_dashboard.stdout"
      tags: [grafana, alerts]

    - name: Deploy Pi cluster health Grafana dashboard
      ansible.builtin.shell: |
        kubectl create configmap pi-cluster-health-dashboard \
          --namespace monitoring \
          --from-file=pi-cluster-health.json={{ playbook_dir }}/../../k8s/monitoring/dashboards/pi-cluster-health.json \
          --dry-run=client -o yaml | \
        kubectl label --local -f - grafana_dashboard=1 -o yaml --dry-run=client | \
        kubectl apply -f -
      register: cluster_dashboard
      changed_when: "'configured' in cluster_dashboard.stdout"
      tags: [grafana, cluster]

    # -- Summary ---------------------------------------------------------------

    - name: Show monitoring pod status
      ansible.builtin.command: kubectl get pods -n monitoring -o wide
      register: monitoring_pods
      changed_when: false
      tags: [verify]

    - name: Display monitoring pods
      ansible.builtin.debug:
        var: monitoring_pods.stdout_lines
      tags: [verify]
