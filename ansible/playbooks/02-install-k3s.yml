---
# Playbook 02: Install K3s on all cluster nodes.
#
# Play 1: Install K3s servers *sequentially* (`serial: 1`). The first host in
#         the k3s_server group runs `--cluster-init` to bootstrap embedded
#         etcd; subsequent hosts join using the node token published by the
#         first server via hostvars. Kube-vip is dropped as an auto-apply
#         manifest so the HA VIP comes up once K3s starts.
#
# Play 2: Install K3s agents on the Pi agents group AND the x86 Proxmox VM
#         agents group. Both join the cluster via the HA VIP.
#
# Usage: ansible-playbook playbooks/02-install-k3s.yml

- name: Install K3s servers (HA control plane, embedded etcd)
  hosts: k3s_server
  become: true
  gather_facts: true
  serial: 1
  order: inventory  # guarantee rpi-k3s-1 runs first (cluster-init), then joins
  roles:
    - role: ../roles/k3s-server

- name: Install K3s agents (Pi + x86)
  hosts: k3s_agents:k3s_x86_agents
  become: true
  gather_facts: true
  roles:
    - role: ../roles/k3s-agent
