---
# Playbook: Setup shell environment on all nodes
# =============================================================================
# Installs zsh, oh-my-zsh, oh-my-posh, eza, and configures the same shell
# experience as the workstation for the personal user on all Pi nodes.
#
# Usage:
#   make shell
# =============================================================================

- name: Setup shell environment
  hosts: "{{ target_hosts | default('k3s_cluster') }}"
  become: true
  vars:
    # Override via --extra-vars '{"shell_users":["myuser","root"]}' to bootstrap multiple users
    shell_users: ["{{ personal_user }}"]

  tasks:
    # -- Install packages ------------------------------------------------------

    - name: Install zsh and dependencies
      ansible.builtin.apt:
        name:
          - zsh
          - git
          - curl
          - unzip
          - fontconfig
        state: present
        update_cache: true
      tags: [packages]

    - name: Install eza (modern ls replacement)
      ansible.builtin.shell: |
        if ! command -v eza &>/dev/null; then
          wget -qO- https://raw.githubusercontent.com/eza-community/eza/main/deb.asc | gpg --dearmor -o /etc/apt/keyrings/gierens.gpg
          echo "deb [signed-by=/etc/apt/keyrings/gierens.gpg] http://deb.gierens.de stable main" | tee /etc/apt/sources.list.d/gierens.list
          apt update
          apt install -y eza
        fi
      args:
        creates: /usr/bin/eza
      tags: [packages]

    # -- Install Oh My Posh (host-level, once) --------------------------------

    - name: Check if oh-my-posh is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/oh-my-posh
      register: omp_bin
      tags: [omp]

    - name: Install oh-my-posh
      ansible.builtin.shell: |
        curl -fsSL https://ohmyposh.dev/install.sh | bash -s -- -d /usr/local/bin
      when: not omp_bin.stat.exists
      tags: [omp]

    # -- Per-user configuration (loop over shell_users) ------------------------

    - name: Set zsh as default shell
      ansible.builtin.user:
        name: "{{ item }}"
        shell: /usr/bin/zsh
      loop: "{{ shell_users }}"
      tags: [shell]

    - name: Build user-to-home mapping (/root for root, /home/<user> otherwise)
      ansible.builtin.set_fact:
        user_homes: "{{ user_homes | default({}) | combine({item: ('/root' if item == 'root' else '/home/' + item)}) }}"
      loop: "{{ shell_users }}"
      tags: [omz, omp, zshrc, shell]

    - name: Check if Oh My Zsh is already installed per user
      ansible.builtin.stat:
        path: "{{ user_homes[item] }}/.oh-my-zsh"
      register: omz_dir
      loop: "{{ shell_users }}"
      tags: [omz]

    - name: Install Oh My Zsh per user
      ansible.builtin.shell: |
        su - {{ item.item }} -c 'sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended'
      loop: "{{ omz_dir.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: not item.stat.exists
      tags: [omz]

    - name: Install zsh-autosuggestions plugin per user
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-autosuggestions.git
        dest: "{{ user_homes[item] }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
        depth: 1
      loop: "{{ shell_users }}"
      tags: [omz]

    - name: Fix oh-my-zsh ownership per user
      ansible.builtin.file:
        path: "{{ user_homes[item] }}/.oh-my-zsh"
        owner: "{{ item }}"
        group: "{{ item }}"
        recurse: true
      loop: "{{ shell_users }}"
      tags: [omz]

    - name: Create oh-my-posh themes directory per user
      ansible.builtin.file:
        path: "{{ user_homes[item] }}/.config/oh-my-posh/themes"
        state: directory
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: "0755"
      loop: "{{ shell_users }}"
      tags: [omp]

    - name: Copy custom atomic theme per user
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../dotfiles/oh-my-posh/atomic.omp.json"
        dest: "{{ user_homes[item] }}/.config/oh-my-posh/themes/atomic.omp.json"
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: "0644"
      loop: "{{ shell_users }}"
      tags: [omp]

    - name: Deploy .zshrc per user
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../dotfiles/zshrc"
        dest: "{{ user_homes[item] }}/.zshrc"
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: "0644"
      loop: "{{ shell_users }}"
      tags: [zshrc]
