---
# Playbook 06: Deploy Cloudflare Tunnel (cloudflared)
# Applies the cloudflared deployment manifest and ingress route
# configuration to expose cluster services via Cloudflare Tunnel.
# Manifests should be placed under ../manifests/cloudflare/ before running.
#
# Usage: ansible-playbook playbooks/06-deploy-cloudflare.yml

- name: Deploy Cloudflare Tunnel to the K3s cluster
  hosts: localhost
  connection: local
  become: false
  gather_facts: false

  vars:
    manifests_dir: "{{ playbook_dir }}/../../k8s/cloudflare"

  tasks:
    # -- Cloudflare Tunnel Deployment ------------------------------------------

    - name: Apply cloudflared deployment manifest
      ansible.builtin.command: >
        kubectl apply -f {{ manifests_dir }}/cloudflared-config.yml -f {{ manifests_dir }}/cloudflared-deployment.yml
      register: cloudflared_deploy
      changed_when: "'configured' in cloudflared_deploy.stdout or 'created' in cloudflared_deploy.stdout"
      tags: [cloudflare]

    # -- Wait for readiness ----------------------------------------------------

    - name: Wait for cloudflared pods to be ready
      ansible.builtin.command: >
        kubectl wait --for=condition=Ready pods
        -l app=cloudflared
        --namespace cloudflare
        --timeout=120s
      changed_when: false
      tags: [cloudflare]

    # -- Summary ---------------------------------------------------------------

    - name: Show cloudflare namespace pod status
      ansible.builtin.command: kubectl get pods -n cloudflare -o wide
      register: cloudflare_pods
      changed_when: false
      tags: [verify]

    - name: Display cloudflare pods
      ansible.builtin.debug:
        var: cloudflare_pods.stdout_lines
      tags: [verify]
