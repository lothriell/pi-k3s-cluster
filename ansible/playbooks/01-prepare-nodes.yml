---
# Playbook 01: Prepare all cluster nodes
# Dispatches the right common role per host based on OS family.
#   - Debian/Ubuntu (Pi + x86 VMs)  → roles/common
#   - Archlinux     (minisforum-c)  → roles/common-arch
# Both variants do the same job: OS updates, packages, kernel modules, sysctl,
# swap removal, /etc/hosts Gitea entry, K3s containerd registry+CA, prune timer.
#
# Usage: ansible-playbook playbooks/01-prepare-nodes.yml

- name: Prepare all K3s cluster nodes
  hosts: k3s_cluster
  become: true
  gather_facts: true

  tasks:
    - name: Apply Debian common role
      ansible.builtin.include_role:
        name: ../roles/common
      when: ansible_os_family == 'Debian'

    - name: Apply Archlinux common role
      ansible.builtin.include_role:
        name: ../roles/common-arch
      when: ansible_os_family == 'Archlinux'
