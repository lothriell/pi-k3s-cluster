---
# Playbook 01: Prepare all cluster nodes
# Applies the common role to every node in the k3s_cluster group.
# This handles OS updates, kernel modules, sysctl tuning, and swap removal.
#
# Usage: ansible-playbook playbooks/01-prepare-nodes.yml

- name: Prepare all K3s cluster nodes
  hosts: k3s_cluster
  become: true
  gather_facts: true

  roles:
    - role: ../roles/common
