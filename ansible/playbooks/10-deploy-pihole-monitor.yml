---
# Playbook 10: Deploy Pi-hole DNS monitoring stack
#
# Deploys on athena:
#   - ntfy (push notification server)
#   - Promtail (ships pihole.log to Loki on K8s)
#   - DNS monitor script (pattern matching + alerts)
#
# Deploys on K8s (from localhost):
#   - Loki (log aggregation, 3-month retention)
#   - Grafana Loki datasource
#
# Usage:
#   ansible-playbook ansible/playbooks/10-deploy-pihole-monitor.yml
#
# Configure watch patterns and IPs in all.yml (or edit directly on athena):
#   /etc/pihole-monitor/watch-patterns.conf
#   /etc/pihole-monitor/watch-ips.conf

- name: Deploy Pi-hole monitoring on athena
  hosts: athena
  become: false
  roles:
    - role: ../roles/pihole-monitor

- name: Deploy Loki on K8s cluster
  hosts: localhost
  connection: local
  become: false
  gather_facts: false

  vars:
    loki_values: "{{ playbook_dir }}/../../k8s/monitoring/values-loki.yml"

  tasks:
    - name: Add Grafana Helm repository
      ansible.builtin.command: helm repo add grafana https://grafana.github.io/helm-charts
      register: helm_repo
      changed_when: "'has been added' in helm_repo.stdout"
      failed_when: false

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: false

    # Values file at k8s/monitoring/values-loki.yml carries the required
    # schemaConfig (newer grafana/loki charts refuse installs without it)
    # plus the singleBinary + retention + resources config that used to be
    # an unwieldy --set list here. Keep all Loki tunables in one place.
    - name: Deploy Loki via Helm
      ansible.builtin.command: >
        helm upgrade --install loki
        grafana/loki
        --namespace monitoring
        --values {{ loki_values }}
        --take-ownership
        --wait
        --timeout 10m
      register: loki_deploy
      changed_when: "'STATUS: deployed' in loki_deploy.stdout"

    - name: Wait for Loki to be ready
      ansible.builtin.command: >
        kubectl wait --for=condition=Ready pods
        -l app.kubernetes.io/name=loki
        --namespace monitoring
        --timeout=300s
      changed_when: false

    # Promtail on athena (outside the cluster) POSTs logs to a fixed
    # NodePort — see ansible/roles/pihole-monitor/templates/promtail-config.yml.j2
    # which uses `{{ k3s_server_ip }}:31100`. The Helm-managed `loki` Service
    # is ClusterIP, so we add a sidecar NodePort Service that points at the
    # same singleBinary pod. Separate object (not a patch of the Helm one)
    # so helm upgrade doesn't clobber it.
    - name: Create Loki NodePort 31100 for external Promtail shippers
      ansible.builtin.shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: Service
        metadata:
          name: loki-nodeport
          namespace: monitoring
          labels:
            app.kubernetes.io/name: loki
            app.kubernetes.io/managed-by: Ansible
        spec:
          type: NodePort
          selector:
            app.kubernetes.io/name: loki
            app.kubernetes.io/component: single-binary
          ports:
            - name: http
              port: 3100
              targetPort: http-metrics
              nodePort: 31100
              protocol: TCP
        EOF
      changed_when: false

    - name: Display Loki status
      ansible.builtin.debug:
        msg: "Loki deployed. Add as Grafana datasource: http://loki.monitoring.svc.cluster.local:3100"
