[defaults]
inventory = ansible/inventory/hosts.yml
remote_user = ansible
private_key_file = ~/.ssh/id_ed25519
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml
timeout = 30
vault_password_file = ~/.ansible/vault_pass

[privilege_escalation]
become = True
become_method = sudo
become_user = root

[ssh_connection]
pipelining = False
